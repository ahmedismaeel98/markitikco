<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markitix</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --main:#002244;
  --orange:#FF6600;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background: radial-gradient(circle at top,#003366,#00172e);
  color:white;
  overflow-x:hidden;
}

/* خلفية متحركة */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(255,102,0,0.08) 1px, transparent 1px);
  background-size:40px 40px;
  animation:moveBg 20s linear infinite;
  z-index:-1;
}

@keyframes moveBg{
  0%{transform:translate(0,0);}
  100%{transform:translate(-200px,-200px);}
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:45px;
  border-radius:50%;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
}

.hero img{
  width:130px;
  margin-bottom:20px;
  animation:float 3s infinite;
}

@keyframes float{
  50%{transform:translateY(-10px);}
}

.hero h1{
  font-size:60px;
}

.hero span{
  color:var(--orange);
}

.btn{
  margin-top:20px;
  display:inline-block;
  padding:12px 30px;
  background:var(--orange);
  border-radius:30px;
  text-decoration:none;
  color:white;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
}

/* SERVICES */
.services{
  padding:60px 20px;
  text-align:center;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:#001f3d;
  padding:25px;
  border-radius:15px;
  transition:0.4s;
}

.card i{
  font-size:35px;
  color:var(--orange);
  margin-bottom:15px;
}

.card:hover{
  transform:translateY(-12px) scale(1.03);
  box-shadow:0 0 20px rgba(255,102,0,0.3);
}

/* CONTACT */
.contact{
  padding:50px;
  text-align:center;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#25D366;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:25px;
}
</style>
</head>

<body>

<nav>
  <div class="logo">
    <img src="logo.png">
    <h3>Markitix</h3>
  </div>
</nav>

<section class="hero">
  <img src="logo.png">
  <h1>Markitix</h1>
  <p>شركة تصميم وتسويق رقمي <span>احترافي</span></p>
  <a href="https://wa.me/9647703718200" class="btn">تواصل معنا</a>
</section>

<section class="services">
  <h2>خدماتنا</h2>

  <div class="cards">

    <div class="card">
      <i class="fa-solid fa-palette"></i>
      <h3>تصميم جرافيك</h3>
    </div>

    <div class="card">
      <i class="fa-solid fa-pen-nib"></i>
      <h3>هوية بصرية</h3>
    </div>

    <div class="card">
      <i class="fa-solid fa-code"></i>
      <h3>تصميم مواقع</h3>
    </div>

    <div class="card">
      <i class="fa-solid fa-bullhorn"></i>
      <h3>تسويق رقمي</h3>
    </div>

    <div class="card">
      <i class="fa-solid fa-pen"></i>
      <h3>تصميم شعارات</h3>
    </div>

    <div class="card">
      <i class="fa-solid fa-video"></i>
      <h3>صناعة محتوى</h3>
    </div>

  </div>
</section>

<section class="contact">
  <h2>تواصل معنا</h2>
  <p>📍 تكريت - صلاح الدين</p>
  <p>📧 info@markitixco.com</p>
  <p>📞 009647703718200</p>
</section>

<a href="https://wa.me/9647703718200" class="whatsapp">
  <i class="fab fa-whatsapp"></i>
</a>

</body>
</html>
